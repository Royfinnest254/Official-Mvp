services:
  # The Highly-Available Go Gateway (Coordinates all forensic evidence)
  - type: web
    name: official-mvp-gateway
    env: go
    plan: free
    region: oregon
    buildCommand: go build -o gateway gateway.go
    startCommand: ./gateway
    envVars:
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NODE_1_URL
        sync: false
      - key: NODE_2_URL
        sync: false
      - key: NODE_3_URL
        sync: false

  # Witness Node 1 (Simulated AWS Node)
  - type: web
    name: connex-witness-aws
    env: go
    plan: free
    region: oregon
    buildCommand: go build -o witness witness.go
    startCommand: ./witness
    envVars:
      - key: NODE_ID
        value: 1
      - key: PRIVATE_KEY
        sync: false

  # Witness Node 2 (Simulated GCP Node)
  - type: web
    name: connex-witness-gcp
    env: go
    plan: free
    region: oregon
    buildCommand: go build -o witness witness.go
    startCommand: ./witness
    envVars:
      - key: NODE_ID
        value: 2
      - key: PRIVATE_KEY
        sync: false

  # Witness Node 3 (Simulated Azure Node)
  - type: web
    name: connex-witness-azure
    env: go
    plan: free
    region: oregon
    buildCommand: go build -o witness witness.go
    startCommand: ./witness
    envVars:
      - key: NODE_ID
        value: 3
      - key: PRIVATE_KEY
        sync: false
